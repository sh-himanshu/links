<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Himanshu Sharma — Links</title>
<meta name="description" content="Himanshu Sharma — Software Developer. Connect with me across the web.">
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--md-primary:#C8AAFF;
--md-on-primary:#1E003E;
--md-primary-container:#4F378B;
--md-on-primary-container:#EADDFF;
--md-secondary:#CCC2DC;
--md-on-secondary:#332D41;
--md-tertiary:#EFB8C8;
--md-on-tertiary:#492532;
--md-surface:#1C1B1F;
--md-surface-variant:#49454F;
--md-on-surface:#E6E1E5;
--md-on-surface-variant:#CAC4D0;
--md-outline:#938F99;
--md-outline-variant:#49454F;
--md-surface-container:#211F26;
--md-surface-container-high:#2B2930;
--md-surface-container-highest:#36343B;
--md-inverse-surface:#E6E1E5;
--md-inverse-on-surface:#313033;
--md-error:#F2B8B5;
--md-shadow:0 1px 3px 1px rgba(0,0,0,.15),0 1px 2px 0 rgba(0,0,0,.3);
--md-shadow-elevated:0 2px 6px 2px rgba(0,0,0,.15),0 1px 2px 0 rgba(0,0,0,.3);
--md-radius-xl:28px;
--md-radius-lg:16px;
--md-radius-md:12px;
--md-radius-sm:8px;
--font:'Space Grotesk',system-ui,sans-serif;
--ease-expressive:cubic-bezier(.2,0,0,1);
}
html{font-family:var(--font);background:var(--md-surface);color:var(--md-on-surface);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{min-height:100dvh;display:flex;align-items:center;justify-content:center;position:relative;overflow-x:hidden}

/* Gradient noise background */
.bg-canvas{position:fixed;inset:0;z-index:0}
.bg-canvas canvas{width:100%;height:100%}

/* Main container */
.container{position:relative;z-index:1;width:100%;max-width:420px;padding:48px 20px 40px;display:flex;flex-direction:column;align-items:center;gap:8px}

/* Profile section */
.profile{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:16px}
.avatar-wrap{position:relative;width:108px;height:108px}
.avatar{width:108px;height:108px;border-radius:50%;object-fit:cover;border:3px solid var(--md-primary);box-shadow:0 0 0 4px var(--md-surface),var(--md-shadow-elevated);transition:transform .3s var(--ease-expressive),box-shadow .3s var(--ease-expressive)}
.avatar:hover{transform:scale(1.04);box-shadow:0 0 0 4px var(--md-surface),0 0 24px rgba(200,170,255,.25)}
.verified{position:absolute;bottom:2px;right:2px;width:28px;height:28px;background:var(--md-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid var(--md-surface);box-shadow:var(--md-shadow)}
.verified svg{width:16px;height:16px;fill:var(--md-on-primary)}

.name{font-size:24px;font-weight:700;letter-spacing:-.02em;color:var(--md-on-surface);text-align:center;line-height:1.2}
.tagline{font-size:14px;font-weight:400;color:var(--md-on-surface-variant);text-align:center;line-height:1.5;max-width:300px}
.location{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--md-outline);font-weight:500}
.location svg{width:16px;height:16px;fill:var(--md-outline)}

/* Links list */
.links{width:100%;display:flex;flex-direction:column;gap:10px;margin-top:4px}

.link-btn{
display:flex;align-items:center;gap:14px;
width:100%;padding:16px 20px;
background:var(--md-surface-container-high);
border:1px solid var(--md-outline-variant);
border-radius:var(--md-radius-xl);
text-decoration:none;color:var(--md-on-surface);
font-family:var(--font);font-size:15px;font-weight:500;
cursor:pointer;position:relative;overflow:hidden;
transition:background .25s var(--ease-expressive),
border-color .25s var(--ease-expressive),
transform .2s var(--ease-expressive),
box-shadow .25s var(--ease-expressive);
}
.link-btn:hover{
background:var(--md-surface-container-highest);
border-color:var(--md-primary);
transform:translateY(-2px);
box-shadow:var(--md-shadow-elevated);
}
.link-btn:active{transform:translateY(0);box-shadow:none;transition-duration:.1s}

/* MD3 state layer ripple */
.link-btn::after{
content:'';position:absolute;inset:0;
background:var(--md-primary);
opacity:0;transition:opacity .2s var(--ease-expressive);
border-radius:inherit;pointer-events:none;
}
.link-btn:hover::after{opacity:.08}
.link-btn:active::after{opacity:.12}

.link-btn:focus-visible{
outline:2px solid var(--md-primary);
outline-offset:2px;
}

.link-icon{
width:40px;height:40px;min-width:40px;
border-radius:var(--md-radius-md);
background:var(--md-primary-container);
display:flex;align-items:center;justify-content:center;
transition:background .25s var(--ease-expressive);
}
.link-btn:hover .link-icon{background:var(--md-primary)}
.link-icon svg{width:20px;height:20px;fill:var(--md-on-primary-container);transition:fill .25s var(--ease-expressive)}
.link-btn:hover .link-icon svg{fill:var(--md-on-primary)}

.link-text{flex:1;display:flex;flex-direction:column;gap:1px}
.link-label{font-size:15px;font-weight:600;line-height:1.3;color:var(--md-on-surface)}
.link-sub{font-size:12px;font-weight:400;color:var(--md-on-surface-variant);line-height:1.3}

.link-arrow{width:20px;height:20px;fill:var(--md-outline);opacity:.6;transition:opacity .2s,transform .2s var(--ease-expressive)}
.link-btn:hover .link-arrow{opacity:1;transform:translateX(3px)}

/* Footer */
.footer{margin-top:24px;text-align:center;font-size:12px;color:var(--md-outline);line-height:1.5}

/* Animations */
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.profile{animation:fadeInUp .5s var(--ease-expressive) both}
.link-btn{animation:fadeInUp .4s var(--ease-expressive) both}
.link-btn:nth-child(1){animation-delay:.1s}
.link-btn:nth-child(2){animation-delay:.15s}
.link-btn:nth-child(3){animation-delay:.2s}
.link-btn:nth-child(4){animation-delay:.25s}
.link-btn:nth-child(5){animation-delay:.3s}
.link-btn:nth-child(6){animation-delay:.35s}
.link-btn:nth-child(7){animation-delay:.4s}
.link-btn:nth-child(8){animation-delay:.45s}
.link-btn:nth-child(9){animation-delay:.5s}
.footer{animation:fadeInUp .4s var(--ease-expressive) .55s both}

@media(prefers-reduced-motion:reduce){
.profile,.link-btn,.footer{animation:none!important}
.link-btn:hover{transform:none}
.avatar:hover{transform:none}
}

/* Small screen tweaks */
@media(max-width:420px){
.container{padding:36px 16px 32px}
.link-btn{padding:14px 16px;gap:12px}
}
</style>
</head>
<body>

<div class="bg-canvas" id="bgCanvas"></div>

<main class="container" id="app">
  <div class="profile">
    <div class="avatar-wrap">
      <img class="avatar" src="assets/img/profile.png" alt="Himanshu Sharma" width="108" height="108">
      <span class="verified" title="Verified"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>
    </div>
    <h1 class="name">Himanshu Sharma</h1>
    <p class="tagline">Software Developer crafting fast, clean & scalable solutions</p>
    <span class="location" id="loc"></span>
  </div>

  <nav class="links" id="links" aria-label="Social links"></nav>

  <footer class="footer">&copy; 2025 Himanshu Sharma</footer>
</main>

<script src="app.js"></script>
</body>
</html>
